    { title: "Social Media Marketing Masterclass", category: "Marketing", platform: "Udemy", link: "https://www.udemy.com/course/social-media-marketing-masterclass/", certificate: true, paid: true },
    { title: "Google Ads Certification", category: "Marketing", platform: "Google Skillshop", link: "https://skillshop.withgoogle.com/", certificate: true, paid: false },
  ];

  const urlParams = new URLSearchParams(window.location.search);
  const category = urlParams.get("category");
  document.getElementById("categoryTitle").innerText = category;

  const courseList = document.getElementById("courseList");
  const filteredCourses = courses.filter(c => c.category === category);

  if (filteredCourses.length === 0) {
    courseList.innerHTML = `<div class="col-12 text-center text-muted mt-4"><h4>No courses found in this category.</h4><p>Check back soon!</p></div>`;
  } else {
    filteredCourses.forEach(course => {
      const certText = course.certificate ? "🎓 Certificate Provided" : "❌ No Certificate";
      const badge = course.paid
        ? "<span class='badge bg-danger'>Paid</span>"
        : "<span class='badge bg-success'>Free</span>";
      courseList.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card course-card h-100">
            <div class="card-body">
              <h5 class="card-title">${course.title}</h5>
              <p class="card-text">Platform: ${course.platform}<br>${certText}</p>
              ${badge}
            </div>
            <div class="card-footer text-center">
              <a href="${course.link}" target="_blank" class="btn btn-yellow">Go to Course</a>
            </div>
          </div>
        </div>
      `;
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
